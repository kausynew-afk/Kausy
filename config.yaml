# ============================================================
# Job Application Agent - Configuration
# ============================================================

profile:
  job_title: "Software Test Engineer"
  location: "Pune, India"
  master_resume_path: "data/resumes/master_resume.md"

  # Multiple search queries — agent searches for EACH keyword across all platforms
  search_keywords:
    - "Software Test Engineer"
    - "QA Engineer"
    - "Test Engineer"
    - "QA Automation Engineer"
    - "SDET"
    - "Software Tester"
    - "Quality Assurance Engineer"
    - "Automation Test Engineer"

scraping:
  platforms:
    - linkedin
    - indeed
    - naukri
  max_results_per_platform: 25
  search_radius_miles: 50
  experience_level: "mid"            # entry, mid, senior, lead
  job_type: "full-time"              # full-time, part-time, contract, remote
  posted_within_days: 14

ats:
  target_score: 70                   # minimum ATS match % before accepting
  max_iterations: 3                  # max resume re-tailoring attempts
  keyword_weights:
    technical_skills: 0.45
    soft_skills: 0.15
    certifications: 0.20
    job_title_match: 0.10
    experience_years: 0.10

safety:
  min_delay_seconds: 3
  max_delay_seconds: 8
  max_applications_per_run: 20
  duplicate_check_db: "data/logs/applied_jobs.json"
  rotate_user_agents: true

logging:
  log_directory: "data/logs"
  output_directory: "output"
  log_level: "INFO"
  save_modified_resumes: true
  save_screenshots: false

automation:
  schedule_cron: "0 8 * * *"         # daily at 8 AM UTC
  notify_on_completion: true
  email_recipient: "kausynew@gmail.com"
