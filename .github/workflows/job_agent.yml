name: Job Application Agent — Daily Run

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Create required directories
        run: |
          mkdir -p data/logs
          mkdir -p output

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run agent and send email report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --config config.yaml

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-${{ github.run_id }}
          path: |
            output/
            data/logs/
          retention-days: 30

      - name: Commit updated dedup and tracker
        if: always()
        run: |
          git config user.name "Job Agent Bot"
          git config user.email "bot@noreply.github.com"
          git add -f data/logs/applied_jobs.json data/logs/tracked_applications.json output/applied_jobs_report.md || true
          git diff --cached --quiet || git commit -m "chore: update job tracker and dedup ledger [skip ci]"
          git push || true
